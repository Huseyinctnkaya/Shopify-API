# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "c55519d2644303d6f56949fe9921328e"
name = "34devs-dashboard-api"
application_url = "https://app.34devs.com/oauth/install"
embedded = false

[webhooks]
api_version = "2026-04"

[[webhooks.subscriptions]]
# Tam (absolute) URL kasıtlı: application_url zaten bir path (/oauth/install)
# içeriyor, Shopify relative uri'leri buna ekliyor (köke göre değil), bu da
# yanlış bir adrese (…/oauth/install/api/webhooks/compliance) yol açıyordu.
uri = "https://app.34devs.com/api/webhooks/compliance"
compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_analytics,read_customers,read_inventory,read_orders,read_products,read_reports"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ "https://app.34devs.com/oauth/callback" ]
